<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le'Tits'Now · Outdoor Conditions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020810; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const RESORTS = [
      "Vail Colorado","Park City Utah","Jackson Hole Wyoming","Mammoth Mountain California",
      "Breckenridge Colorado","Telluride Colorado","Steamboat Springs Colorado",
      "Sun Valley Idaho","Aspen Snowmass Colorado","Whistler Blackcomb BC",
      "Alta Utah","Snowbird Utah","Taos Ski Valley New Mexico","Big Sky Montana",
      "Stowe Vermont"
    ];

    const RIVERS = [
      "Colorado River Grand Canyon Arizona","Gauley River West Virginia",
      "Chattooga River Georgia South Carolina","Arkansas River Browns Canyon Colorado",
      "Salmon River Idaho","Ocoee River Tennessee","New River West Virginia",
      "American River California","Rio Grande New Mexico","Nantahala River North Carolina",
      "Animas River Colorado","Snake River Wyoming","Kennebec River Maine",
      "Deschutes River Oregon","Payette River Idaho"
    ];

    const SNOW_SYSTEM_PROMPT = `You are a ski resort conditions reporter. Return ONLY a valid JSON array, no markdown, no explanation, no preamble. Format:
[{"resort":"Resort Name","state":"State","snowDepth":85,"newSnow48h":12,"snowType":"Powder","openTrails":142,"totalTrails":193,"liftsOpen":28,"totalLifts":34,"overallRating":92,"conditions":"Excellent","note":"Short note about conditions"}]
snowDepth is base depth in inches. newSnow48h is new snow in last 48 hours in inches. snowType is one of: Powder, Packed Powder, Groomed, Wet Snow, Icy, Mixed. overallRating is 0-100. conditions is one of: Epic, Excellent, Good, Fair, Poor.`;

    const RIVER_SYSTEM_PROMPT = `You are a whitewater river conditions reporter. Return ONLY a valid JSON array, no markdown, no explanation. Format:
[{"river":"River Name","state":"State","classRating":"IV","waterLevel":"Medium High","cfs":1850,"gaugeReading":3.2,"trend":"Rising","runnable":true,"optimalRange":"1500-2500 cfs","highlight":"Short highlight","safetyNote":"Safety note","overallRating":88}]
classRating is Roman numeral I through V (or V+ for extreme). waterLevel is one of: Low, Optimal, Medium High, High, Flood Stage. trend is one of: Rising, Falling, Steady. runnable is boolean. overallRating is 0-100.`;

    function snowConditionColor(cond) {
      return { Epic:"#00e5ff", Excellent:"#4ade80", Good:"#facc15", Fair:"#fb923c", Poor:"#f87171" }[cond] || "#94a3b8";
    }

    function riverClassColor(cls) {
      return { "I":"#4ade80","II":"#86efac","III":"#facc15","IV":"#fb923c","V":"#f87171","V+":"#dc2626" }[cls] || "#94a3b8";
    }

    function trendIcon(trend) {
      return trend === "Rising" ? "↑" : trend === "Falling" ? "↓" : "→";
    }

    function trendColor(trend) {
      return trend === "Rising" ? "#60a5fa" : trend === "Falling" ? "#f87171" : "#94a3b8";
    }

    function RatingBar({ value, color }) {
      return (
        <div style={{ background:"rgba(255,255,255,0.08)", borderRadius:4, height:6, width:"100%", overflow:"hidden" }}>
          <div style={{ width:`${value}%`, height:"100%", background:color, borderRadius:4, transition:"width 1s ease" }} />
        </div>
      );
    }

    function SkiCard({ resort, rank, visible }) {
      const condColor = snowConditionColor(resort.conditions);
      return (
        <div style={{
          opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(20px)",
          transition: `opacity 0.4s ease ${rank * 0.05}s, transform 0.4s ease ${rank * 0.05}s`,
          background: "rgba(15,25,50,0.85)", border: "1px solid rgba(100,160,255,0.15)",
          borderRadius: 16, padding: "18px 20px", position: "relative", overflow: "hidden"
        }}>
          <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${condColor}88, ${condColor})` }} />
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
            <div>
              <span style={{ fontSize:11, color:"#64748b", fontFamily:"monospace", letterSpacing:2 }}>#{rank + 1}</span>
              <div style={{ fontSize:17, fontWeight:800, color:"#e2e8f0", fontFamily:"'Bebas Neue', sans-serif", letterSpacing:1, lineHeight:1.1 }}>{resort.resort}</div>
              <div style={{ fontSize:11, color:"#64748b", fontFamily:"monospace" }}>{resort.state}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:28, fontWeight:900, color:condColor, fontFamily:"'Bebas Neue', sans-serif", lineHeight:1 }}>{resort.overallRating}</div>
              <div style={{ fontSize:10, color:"#64748b", textTransform:"uppercase", letterSpacing:1 }}>Score</div>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 }}>
            {[
              { label:"Base Depth", value:`${resort.snowDepth}"`, highlight: resort.snowDepth > 60 },
              { label:"New (48h)", value:`${resort.newSnow48h}"`, highlight: resort.newSnow48h > 6 },
              { label:"Snow Type", value: resort.snowType, highlight: resort.snowType === "Powder" }
            ].map(s => (
              <div key={s.label} style={{ background:"rgba(255,255,255,0.04)", borderRadius:8, padding:"8px 10px" }}>
                <div style={{ fontSize:10, color:"#64748b", textTransform:"uppercase", letterSpacing:1 }}>{s.label}</div>
                <div style={{ fontSize:13, fontWeight:700, color: s.highlight ? "#7dd3fc" : "#cbd5e1" }}>{s.value}</div>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:10, flexWrap:"wrap" }}>
            <span style={{ background:condColor+"22", border:`1px solid ${condColor}55`, color:condColor, fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, letterSpacing:1 }}>{resort.conditions}</span>
            <span style={{ color:"#64748b", fontSize:11 }}>Trails: <b style={{ color:"#94a3b8" }}>{resort.openTrails}/{resort.totalTrails}</b></span>
            <span style={{ color:"#64748b", fontSize:11 }}>Lifts: <b style={{ color:"#94a3b8" }}>{resort.liftsOpen}/{resort.totalLifts}</b></span>
          </div>
          <RatingBar value={resort.overallRating} color={condColor} />
          {resort.note && <div style={{ marginTop:8, fontSize:11, color:"#64748b", fontStyle:"italic", lineHeight:1.4 }}>{resort.note}</div>}
        </div>
      );
    }

    function RiverCard({ river, rank, visible }) {
      const clsColor = riverClassColor(river.classRating);
      return (
        <div style={{
          opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(20px)",
          transition: `opacity 0.4s ease ${rank * 0.05}s, transform 0.4s ease ${rank * 0.05}s`,
          background: "rgba(5,20,35,0.9)", border: "1px solid rgba(0,200,150,0.15)",
          borderRadius: 16, padding: "18px 20px", position: "relative", overflow: "hidden"
        }}>
          <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${clsColor}88, ${clsColor})` }} />
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
            <div>
              <span style={{ fontSize:11, color:"#64748b", fontFamily:"monospace", letterSpacing:2 }}>#{rank + 1}</span>
              <div style={{ fontSize:17, fontWeight:800, color:"#e2e8f0", fontFamily:"'Bebas Neue', sans-serif", letterSpacing:1, lineHeight:1.1 }}>{river.river}</div>
              <div style={{ fontSize:11, color:"#64748b", fontFamily:"monospace" }}>{river.state}</div>
            </div>
            <div style={{ textAlign:"right", display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
              <div style={{ background:clsColor+"22", border:`2px solid ${clsColor}`, borderRadius:10, padding:"4px 14px" }}>
                <span style={{ fontSize:20, fontWeight:900, color:clsColor, fontFamily:"'Bebas Neue', sans-serif" }}>CLASS {river.classRating}</span>
              </div>
              <div style={{ fontSize:11, color:trendColor(river.trend), fontWeight:700 }}>
                {trendIcon(river.trend)} {river.trend}
              </div>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 }}>
            {[
              { label:"Water Level", value: river.waterLevel, highlight: river.waterLevel === "Optimal" },
              { label:"Flow (CFS)", value: river.cfs ? river.cfs.toLocaleString() : "—" },
              { label:"Gauge", value: river.gaugeReading ? `${river.gaugeReading} ft` : "—" }
            ].map(s => (
              <div key={s.label} style={{ background:"rgba(255,255,255,0.04)", borderRadius:8, padding:"8px 10px" }}>
                <div style={{ fontSize:10, color:"#64748b", textTransform:"uppercase", letterSpacing:1 }}>{s.label}</div>
                <div style={{ fontSize:13, fontWeight:700, color: s.highlight ? "#34d399" : "#cbd5e1" }}>{s.value}</div>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:10, flexWrap:"wrap" }}>
            <span style={{
              background: river.runnable ? "#34d39922" : "#f8717122",
              border: `1px solid ${river.runnable ? "#34d39955" : "#f8717155"}`,
              color: river.runnable ? "#34d399" : "#f87171",
              fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, letterSpacing:1
            }}>{river.runnable ? "✓ Runnable" : "✗ Not Runnable"}</span>
            {river.optimalRange && <span style={{ color:"#64748b", fontSize:11 }}>Optimal: <b style={{ color:"#94a3b8" }}>{river.optimalRange}</b></span>}
          </div>
          <RatingBar value={river.overallRating} color={clsColor} />
          {river.highlight && <div style={{ marginTop:8, fontSize:11, color:"#94a3b8", lineHeight:1.4 }}>🎯 {river.highlight}</div>}
          {river.safetyNote && <div style={{ marginTop:4, fontSize:11, color:"#f59e0b", lineHeight:1.4 }}>⚠ {river.safetyNote}</div>}
        </div>
      );
    }

    function LoadingPulse({ module }) {
      const [dots, setDots] = useState(0);
      const [msgIdx, setMsgIdx] = useState(0);
      const messages = module === "ski"
        ? ["Checking powder depth across 15 resorts","Scanning storm reports and trail maps","Ranking resorts by real snow conditions","Pulling live lift status"]
        : ["Scanning river gauges nationwide","Checking USGS water flow data","Assessing rapid conditions","Ranking rivers by current runnability"];
      useEffect(() => {
        const t1 = setInterval(() => setDots(d => (d + 1) % 4), 400);
        const t2 = setInterval(() => setMsgIdx(i => (i + 1) % messages.length), 2000);
        return () => { clearInterval(t1); clearInterval(t2); };
      }, []);
      const color = module === "ski" ? "#60a5fa" : "#34d399";
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:300, gap:20 }}>
          <div style={{ position:"relative", width:80, height:80 }}>
            <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`3px solid ${color}33` }} />
            <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:"3px solid transparent", borderTopColor:color, animation:"spin 1s linear infinite" }} />
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>
              {module === "ski" ? "⛷" : "🌊"}
            </div>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ color, fontFamily:"'Bebas Neue', sans-serif", fontSize:18, letterSpacing:2 }}>
              {messages[msgIdx]}{".".repeat(dots)}
            </div>
            <div style={{ color:"#475569", fontSize:12, marginTop:4, fontFamily:"monospace" }}>AI-generated conditions report</div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeModule, setActiveModule] = useState("ski");
      const [skiData, setSkiData] = useState(null);
      const [riverData, setRiverData] = useState(null);
      const [skiLoading, setSkiLoading] = useState(false);
      const [riverLoading, setRiverLoading] = useState(false);
      const [skiError, setSkiError] = useState(null);
      const [riverError, setRiverError] = useState(null);
      const [cardsVisible, setCardsVisible] = useState(false);
      const [skiSort, setSkiSort] = useState("overallRating");
      const [riverSort, setRiverSort] = useState("overallRating");
      const [lastUpdatedSki, setLastUpdatedSki] = useState(null);
      const [lastUpdatedRiver, setLastUpdatedRiver] = useState(null);

      const extractJSON = (content) => {
        let text = "";
        for (const block of (content || [])) {
          if (block.type === "text" && block.text) text += block.text;
        }
        text = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
        try { return JSON.parse(text); } catch {}
        const start = text.indexOf("[");
        const end = text.lastIndexOf("]");
        if (start !== -1 && end !== -1 && end > start) {
          try { return JSON.parse(text.slice(start, end + 1)); } catch {}
          const objects = [];
          let depth = 0, objStart = -1;
          for (let i = start; i <= end; i++) {
            if (text[i] === "{") { if (depth === 0) objStart = i; depth++; }
            else if (text[i] === "}") {
              depth--;
              if (depth === 0 && objStart !== -1) {
                try { objects.push(JSON.parse(text.slice(objStart, i + 1))); } catch {}
              }
            }
          }
          if (objects.length > 0) return objects;
        }
        throw new Error("Could not extract JSON from response");
      };

      const callAPI = async (systemPrompt, userMsg) => {
        const res = await fetch("/.netlify/functions/proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 4000,
            system: systemPrompt,
            messages: [{ role: "user", content: userMsg }]
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return extractJSON(data.content);
      };

      const fetchSkiData = async () => {
        setSkiLoading(true); setSkiError(null); setCardsVisible(false);
        try {
          const parsed = await callAPI(
            SNOW_SYSTEM_PROMPT,
            `Today is ${new Date().toLocaleDateString()}. Generate realistic current ski resort snow conditions for these 15 resorts based on your knowledge of typical seasonal conditions. Return JSON array ONLY: ${RESORTS.join(", ")}`
          );
          setSkiData(parsed);
          setLastUpdatedSki(new Date());
          setTimeout(() => setCardsVisible(true), 100);
        } catch(e) { setSkiError("Failed to load ski data: " + e.message); }
        setSkiLoading(false);
      };

      const fetchRiverData = async () => {
        setRiverLoading(true); setRiverError(null); setCardsVisible(false);
        try {
          const parsed = await callAPI(
            RIVER_SYSTEM_PROMPT,
            `Today is ${new Date().toLocaleDateString()}. Generate realistic current whitewater river conditions for these 15 rivers based on typical seasonal conditions. Return JSON array ONLY: ${RIVERS.join(", ")}`
          );
          setRiverData(parsed);
          setLastUpdatedRiver(new Date());
          setTimeout(() => setCardsVisible(true), 100);
        } catch(e) { setRiverError("Failed to load river data: " + e.message); }
        setRiverLoading(false);
      };

      const sortedSki = skiData ? [...skiData].sort((a, b) => (b[skiSort] || 0) - (a[skiSort] || 0)) : [];
      const sortedRivers = riverData ? [...riverData].sort((a, b) => (b[riverSort] || 0) - (a[riverSort] || 0)) : [];
      const isSkiActive = activeModule === "ski";

      const handleTabSwitch = (mod) => {
        setActiveModule(mod);
        setCardsVisible(false);
        setTimeout(() => setCardsVisible(true), 50);
      };

      return (
        <div style={{
          minHeight:"100vh",
          background: isSkiActive
            ? "radial-gradient(ellipse at top, #0a1628 0%, #050d1e 50%, #020810 100%)"
            : "radial-gradient(ellipse at top, #001a1a 0%, #020d12 50%, #010608 100%)",
          fontFamily:"'Inter', sans-serif",
          transition:"background 0.6s ease"
        }}>

          <div style={{ padding:"30px 20px 0", textAlign:"center" }}>
            <div style={{ animation:"float 3s ease-in-out infinite", display:"inline-block", fontSize:48, marginBottom:-4 }}>
              {isSkiActive ? "🏔" : "🌊"}
            </div>
            <h1 style={{
              fontFamily:"'Bebas Neue', sans-serif",
              fontSize:"clamp(48px, 10vw, 80px)",
              letterSpacing:6, margin:"0 0 -4px",
              color: isSkiActive ? "#93c5fd" : "#34d399",
              display:"block",
              lineHeight:1.1,
            }}>{isSkiActive ? "Le'Tits'Now" : "Git'R'Wet"}</h1>
            <p style={{ color:"#475569", fontSize:12, letterSpacing:4, textTransform:"uppercase", fontFamily:"monospace", marginBottom:20 }}>
              {isSkiActive ? "Snow Conditions · US Ski Resorts" : "River Levels · US Whitewater Runs"}
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"center", marginBottom:24, flexWrap:"wrap" }}>
              {[
                { id:"ski", label:"⛷  SKI RESORTS", color:"#60a5fa" },
                { id:"river", label:"🌊  WHITEWATER RIVERS", color:"#34d399" }
              ].map(tab => (
                <button key={tab.id} onClick={() => handleTabSwitch(tab.id)} style={{
                  background: activeModule === tab.id ? tab.color+"22" : "rgba(255,255,255,0.03)",
                  border: `1px solid ${activeModule === tab.id ? tab.color+"88" : "rgba(255,255,255,0.08)"}`,
                  color: activeModule === tab.id ? tab.color : "#475569",
                  padding:"10px 20px", borderRadius:30, cursor:"pointer",
                  fontFamily:"'Bebas Neue', sans-serif", fontSize:15, letterSpacing:2,
                  transition:"all 0.3s ease"
                }}>{tab.label}</button>
              ))}
            </div>
          </div>

          <div style={{ maxWidth:1100, margin:"0 auto", padding:"0 16px 40px" }}>

            {/* SKI MODULE */}
            {activeModule === "ski" && (
              <div>
                <div style={{ display:"flex", gap:10, marginBottom:20, alignItems:"center", flexWrap:"wrap" }}>
                  <button onClick={fetchSkiData} disabled={skiLoading} style={{
                    background: skiLoading ? "rgba(96,165,250,0.1)" : "linear-gradient(135deg, #1d4ed8, #3b82f6)",
                    border:"none", color:"#fff", padding:"12px 28px", borderRadius:30,
                    cursor: skiLoading ? "not-allowed" : "pointer", fontFamily:"'Bebas Neue', sans-serif",
                    fontSize:16, letterSpacing:2, boxShadow: skiLoading ? "none" : "0 4px 20px rgba(59,130,246,0.4)",
                    transition:"all 0.3s"
                  }}>{skiLoading ? "SCANNING..." : skiData ? "🔄  REFRESH CONDITIONS" : "⛷  LOAD SKI CONDITIONS"}</button>
                  {skiData && (
                    <>
                      <span style={{ color:"#334155", fontSize:11, fontFamily:"monospace" }}>Sort:</span>
                      {[["overallRating","Score"],["snowDepth","Base Depth"],["newSnow48h","New Snow"]].map(([val,label]) => (
                        <button key={val} onClick={() => setSkiSort(val)} style={{
                          background: skiSort === val ? "rgba(96,165,250,0.2)" : "transparent",
                          border: `1px solid ${skiSort === val ? "#60a5fa88" : "rgba(255,255,255,0.08)"}`,
                          color: skiSort === val ? "#60a5fa" : "#475569",
                          padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:11,
                          fontFamily:"monospace", letterSpacing:1, transition:"all 0.2s"
                        }}>{label}</button>
                      ))}
                      <span style={{ color:"#334155", fontSize:11, fontFamily:"monospace", marginLeft:"auto" }}>
                        Updated {lastUpdatedSki && lastUpdatedSki.toLocaleTimeString()}
                      </span>
                    </>
                  )}
                </div>
                {skiLoading && <LoadingPulse module="ski" />}
                {skiError && <div style={{ color:"#f87171", background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.2)", borderRadius:12, padding:"16px 20px", fontSize:14 }}>{skiError}</div>}
                {!skiLoading && !skiData && !skiError && (
                  <div style={{ textAlign:"center", padding:"60px 20px" }}>
                    <div style={{ fontSize:64, marginBottom:16, opacity:0.3 }}>❄️</div>
                    <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:24, letterSpacing:3, color:"#1e3a5f" }}>HIT LOAD TO CHECK THE SNOW</div>
                    <div style={{ fontSize:12, color:"#0f2840", marginTop:8 }}>AI conditions report for 15 top US ski resorts</div>
                  </div>
                )}
                {sortedSki.length > 0 && (
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:14 }}>
                    {sortedSki.map((r, i) => <SkiCard key={r.resort + i} resort={r} rank={i} visible={cardsVisible} />)}
                  </div>
                )}
              </div>
            )}

            {/* RIVER MODULE */}
            {activeModule === "river" && (
              <div>
                <div style={{ display:"flex", gap:10, marginBottom:20, alignItems:"center", flexWrap:"wrap" }}>
                  <button onClick={fetchRiverData} disabled={riverLoading} style={{
                    background: riverLoading ? "rgba(52,211,153,0.1)" : "linear-gradient(135deg, #065f46, #10b981)",
                    border:"none", color:"#fff", padding:"12px 28px", borderRadius:30,
                    cursor: riverLoading ? "not-allowed" : "pointer", fontFamily:"'Bebas Neue', sans-serif",
                    fontSize:16, letterSpacing:2, boxShadow: riverLoading ? "none" : "0 4px 20px rgba(16,185,129,0.4)",
                    transition:"all 0.3s"
                  }}>{riverLoading ? "SCANNING..." : riverData ? "🔄  REFRESH CONDITIONS" : "🌊  LOAD RIVER CONDITIONS"}</button>
                  {riverData && (
                    <>
                      <span style={{ color:"#334155", fontSize:11, fontFamily:"monospace" }}>Sort:</span>
                      {[["overallRating","Score"],["cfs","Flow (CFS)"]].map(([val,label]) => (
                        <button key={val} onClick={() => setRiverSort(val)} style={{
                          background: riverSort === val ? "rgba(52,211,153,0.2)" : "transparent",
                          border: `1px solid ${riverSort === val ? "#34d39988" : "rgba(255,255,255,0.08)"}`,
                          color: riverSort === val ? "#34d399" : "#475569",
                          padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:11,
                          fontFamily:"monospace", letterSpacing:1, transition:"all 0.2s"
                        }}>{label}</button>
                      ))}
                      <span style={{ color:"#334155", fontSize:11, fontFamily:"monospace", marginLeft:"auto" }}>
                        Updated {lastUpdatedRiver && lastUpdatedRiver.toLocaleTimeString()}
                      </span>
                    </>
                  )}
                </div>
                {riverLoading && <LoadingPulse module="river" />}
                {riverError && <div style={{ color:"#f87171", background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.2)", borderRadius:12, padding:"16px 20px", fontSize:14 }}>{riverError}</div>}
                {!riverLoading && !riverData && !riverError && (
                  <div style={{ textAlign:"center", padding:"60px 20px" }}>
                    <div style={{ fontSize:64, marginBottom:16, opacity:0.3 }}>🌊</div>
                    <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:24, letterSpacing:3, color:"#064e3b" }}>HIT LOAD TO CHECK THE RIVERS</div>
                    <div style={{ fontSize:12, color:"#065f46", marginTop:8 }}>AI conditions report for 15 top US whitewater rivers</div>
                  </div>
                )}
                {sortedRivers.length > 0 && (
                  <>
                    <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
                      <span style={{ fontSize:11, color:"#475569", fontFamily:"monospace", alignSelf:"center" }}>CLASS:</span>
                      {[["I","Beginner","#4ade80"],["II","Novice","#86efac"],["III","Intermediate","#facc15"],["IV","Advanced","#fb923c"],["V","Expert","#f87171"],["V+","Extreme","#dc2626"]].map(([cls,label,color]) => (
                        <span key={cls} style={{ background:color+"22", border:`1px solid ${color}55`, color, fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:20, fontFamily:"'Bebas Neue', sans-serif", letterSpacing:1 }}>
                          {cls} · {label}
                        </span>
                      ))}
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:14 }}>
                      {sortedRivers.map((r, i) => <RiverCard key={r.river + i} river={r} rank={i} visible={cardsVisible} />)}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>

          <div style={{ textAlign:"center", padding:"0 0 24px", color:"#0f172a" }}>
            <div style={{ fontSize:10, fontFamily:"monospace", letterSpacing:2 }}>
              LE'TITS'NOW · GIT'R'WET · OUTDOOR CONDITIONS · POWERED BY AI
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
